name: CD

on:
  push:
    branches: [main]

jobs:
  deploy-hf-space:
    runs-on: ubuntu-latest
    environment: HuggingFace

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #- name: Build Docker image (validation)
      #  run: docker build -t credit-scoring .

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b hf-deploy

          git add -A
          git commit -m "Deploy ${{ github.sha }}" || echo "No changes to commit"

          git remote add hf https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/credit-scoring
          git push hf HEAD:main --force