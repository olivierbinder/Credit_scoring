name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dépendances
        run: uv sync --group dev

      - name: Lint
        run: |
            uv run ruff check src/ tests/
            uv run ruff format --check src/ tests/

      - name: Tests
        run: uv run pytest