# config/training.yaml
experiment:
  name: "Credit_Scoring"
  model: "lightgbm"
  data_loading: "full"
  ft_engineering: "main"
  ft_selection: "importance_20"
  random_state: 42
  test_size: 0.2

models:
  lightgbm:
    n_estimators: 300
    learning_rate: 0.04
    num_leaves: 8
    colsample_bytree: 0.8
    subsample: 0.7
    max_depth: 4
    reg_alpha: 1.1
    reg_lambda: 1
    min_split_gain: 0.02
    min_child_weight: 100
    n_jobs: -1
    max_bin: 127
    verbose: -1

  xgboost:
    n_estimators: 100
    learning_rate: 0.08
    max_depth: 6
    min_child_weight: 2
    scale_pos_weight: 11.5

  catboost:
    iterations: 1000
    learning_rate: 0.05
    depth: 6
    l2_leaf_reg: 3.0
    auto_class_weights: "Balanced"
    od_type: "Iter"
    od_wait: 50

  random_forest:
    n_estimators: 300
    max_depth: 8
    min_samples_split: 20
    min_samples_leaf: 10
    max_features: "sqrt"
    max_samples: 0.7
    class_weight: "balanced"
    criterion: "gini"
    n_jobs: -1

  log_reg:
    solver: "lbfgs"
    max_iter: 150
    C: 1.0
    l1_ratio: 0.0
    class_weight: "balanced"
    tol: 0.001

  dummy:
    strategy: "stratified"
